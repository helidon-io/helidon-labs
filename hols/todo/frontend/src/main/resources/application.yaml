env: docker

server:
  port: 7001
  features:
    access-log:
      enabled: true
#    security:
#      paths:
#        - path: "/api/{+}"
#          authenticate: false

#cors:
#  allow-origins: ["https://cdnjs.cloudflare.com", "https://raw.githubusercontent.com", "*"]
#  allow-methods: ["GET", "POST", "DELETE", "PUT"]

tracing:
  components:
    web-server:
      spans:
        - name: "HTTP Request"
          logs:
            - name: "content-read"
              enabled: false
        - name: "HTTP Request"
          logs:
            - name: "content-write"
              enabled: false
  service: "todo:frontend"
  sampler-param: 1
  sampler-type: constant
  paths:
    - path: "/favicon.ico"
      enabled: false
    - path: "/metrics"
      enabled: false
    - path: "/health"
      enabled: false
  propagation: w3c

services:
  backend.endpoint: "http://localhost:8080"
